services:
  horizon:
    build:
      context: .
      network: host
    container_name: horizon
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
      - HORIZON_TRIGGER_HOST=0.0.0.0
      - HORIZON_TRIGGER_PORT=8765
    ports:
      - "8765:8765"
    restart: unless-stopped
    entrypoint: ["uv", "run", "python", "-m", "src.services.trigger_server"]
