services:
  n8n:
    image: n8nio/n8n:2.21.7
    container_name: n8n
    working_dir: /home/node/.n8n-files
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - N8N_ALLOWED_FILE_ACCESS=/home/node/.n8n-files
      - N8N_RUNNERS_TASK_TIMEOUT=600
      - NODES_EXCLUDE=[]
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./articles:/home/node/.n8n-files/articles
      - ./lmg:/home/node/.n8n-files/lmg
      - ./horizon:/home/node/.n8n-files/horizon
